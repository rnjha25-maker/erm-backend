server:
  port: 8082

spring:
  application:
    name: erm-query-organization

  # ====================== Database ======================
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      minimum-idle: 1
      maximum-pool-size: 3
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000
      pool-name: HikariPool-ERM-Query

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true

  cache:
    type: redis

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 6000

  # ====================== Logging ======================
  logging:
    level:
      org.springframework.cache: DEBUG

  # ====================== Eureka ======================
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE:http://erm-discovery-server:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  server:
    enable-self-preservation: false

logging:
  level:
    org.springframework.security: DEBUG