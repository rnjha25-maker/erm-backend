version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: erm-mysql
    environment:
      MYSQL_DATABASE: erm2
      MYSQL_ROOT_PASSWORD: 2116
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    command:
      - --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: erm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 10

  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_PATH: discovery-server
    container_name: erm-discovery-server
    environment:
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8761:8761"
    restart: unless-stopped
    depends_on:
      - mysql
      - redis

  erm-api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_PATH: erm-api-gateway
    container_name: erm-api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/erm2?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 2116
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://discovery-server:8761/eureka/
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  erm-backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_PATH: ERM_backend
    container_name: erm-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/erm2?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 2116
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://discovery-server:8761/eureka/
    ports:
      - "8086:8086"
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  erm-command-organization:
