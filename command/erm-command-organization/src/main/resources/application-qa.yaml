server:
  port: 8081

spring:
  application:
    name: erm-command-organization

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  main:
    lazy-initialization: true   # 🚀 faster startup

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/erm}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 3
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 5000                 # 🔥 faster fail
      initialization-fail-timeout: 0           # 🔥 don't block startup

# ================== EUREKA ==================
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE:http://erm-discovery-server:8761/eureka/}
    register-with-eureka: true
    fetch-registry: false   # 🔥 don't block startup

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# ================== ACTUATOR ==================
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
        
# ================== LOGGING ==================
logging:
  level:
    root: INFO
    com.erm: DEBUG
    org.springframework.security: WARN