name: Deploy To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and Push Discovery Server
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=discovery-server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/erm-discovery-server:latest
      
      - name: Build and Push ERM Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=ERM_backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/erm-backend:latest
      
      - name: Build and Push API Gateway
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=erm-api-gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/erm-api-gateway:latest
      
      - name: Build and Push Microservices
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            MODULE_PATH=command/erm-command-organization
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/erm-command-organization:latest
      
      - name: Build and Push Query Organization
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=query/erm-query-organization
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/erm-query-organization:latest
      
      - name: Build and Push Org Setup Command
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=command/org-setup-command
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/erm-org-setup-command:latest
      
      - name: Build and Push User Setup
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=command/user-command
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/erm-user-setup:latest
      
      - name: Build and Push Storage
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=command/storage
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/erm-storage:latest
      
      - name: Build and Push User Query
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=query/user-query
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/erm-user-query:latest
      
      - name: Build and Push Org Setup Query
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=query/org-setup-query
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/erm-org-setup-query:latest
      
      
      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          debug: true
          script: |
            whoami
            hostname
      
      - name: Copy project to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          source: ".dockerignore,Dockerfile,docker-compose.ec2.yml,pom.xml,README.md,discovery-server,erm-api-gateway,ERM_backend,command,query,docker"
          target: ${{ secrets.EC2_APP_DIR }}
          overwrite: true
          strip_components: 0

      - name: Create .env.ec2 configuration
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          script: |
            mkdir -p "${{ secrets.EC2_APP_DIR }}"
            cat > "${{ secrets.EC2_APP_DIR }}/.env.ec2" << EOF
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_RDS_ENDPOINT=${{ secrets.AWS_RDS_ENDPOINT }}
            AWS_RDS_PORT=${{ secrets.AWS_RDS_PORT != '' && secrets.AWS_RDS_PORT || '3306' }}
            AWS_RDS_USERNAME=${{ secrets.AWS_RDS_USERNAME }}
            AWS_RDS_PASSWORD=${{ secrets.AWS_RDS_PASSWORD }}
            AWS_REDIS_ENDPOINT=${{ secrets.AWS_REDIS_ENDPOINT }}
            AWS_REDIS_PORT=${{ secrets.AWS_REDIS_PORT != '' && secrets.AWS_REDIS_PORT || '6379' }}
            EOF
      
      - name: Deploy Infrastructure Services (Discovery Server)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.EC2_APP_DIR }}"
            export $(cat .env.ec2 | grep -v '^#' | xargs)
            docker-compose -f docker-compose.ec2.yml -p erm pull discovery-server
            docker-compose -f docker-compose.ec2.yml -p erm up -d discovery-server
            echo "Waiting for Discovery Server to be ready..."
            sleep 10
      
      - name: Deploy Core Microservices
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.EC2_APP_DIR }}"
            export $(cat .env.ec2 | grep -v '^#' | xargs)
            echo "Deploying core microservices..."
            docker-compose -f docker-compose.ec2.yml -p erm pull
              erm-backend \
              erm-command-organization \
              erm-query-organization \
              org-setup-command \
              user-setup \
              storage \
              user-query \
              org-setup-query
            echo "Waiting for microservices to stabilize..."
            sleep 15
            echo "Waiting for microservices to stabilize..."
            sleep 15
      
      - name: Deploy API Gateway
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.EC2_APP_DIR }}"
            export $(cat .env.ec2 | grep -v '^#' | xargs)
            echo "Deploying API Gateway..."
            docker-compose -f docker-compose.ec2.yml -p erm pull erm-api-gateway
            docker-compose -f docker-compose.ec2.yml -p erm up -d erm-api-gateway
            sleep 5
            echo "Deployment complete!"
            docker-compose -f docker-compose.ec2.yml -p erm ps
      
      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          script: |
            cd "${{ secrets.EC2_APP_DIR }}"
            export $(cat .env.ec2 | grep -v '^#' | xargs)
            echo "Service Status:"
            docker-compose -f docker-compose.ec2.yml -p erm ps
            echo ""
            echo "Recent logs from API Gateway:"
            docker-compose -f docker-compose.ec2.yml -p erm logs --tail=20 erm-api-gateway
