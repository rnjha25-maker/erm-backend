name: Deploy To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          debug: true
          script: |
            whoami
            hostname
      - name: Copy project to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          source: ".dockerignore,Dockerfile,docker-compose.yml,pom.xml,README.md,discovery-server,erm-api-gateway,ERM_backend,command,query,docker"
          target: ${{ secrets.EC2_APP_DIR }}
          overwrite: true
          strip_components: 0

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        env:
          MYSQL_HOST_PORT: ${{ secrets.MYSQL_HOST_PORT || '3307' }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          envs: MYSQL_HOST_PORT
          script: |
            set -e
            mkdir -p "${{ secrets.EC2_APP_DIR }}"
            cd "${{ secrets.EC2_APP_DIR }}"
            docker compose up --build -d --remove-orphans
