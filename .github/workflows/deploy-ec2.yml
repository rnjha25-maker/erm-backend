name: Deploy To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Build and Push Services (your existing steps)
      - name: Build & Push discovery-server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=discovery-server
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/erm-discovery-server:latest

      - name: Build & Push erm-api-gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=erm-api-gateway
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/erm-api-gateway:latest

      - name: Build & Push erm-command-organization
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=command/erm-command-organization
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/erm-command-organization:latest

      - name: Build & Push org-setup-command
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=command/org-setup-command
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/erm-org-setup-command:latest

      - name: Build & Push user-setup-command
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=command/user-command
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/erm-user-setup:latest

      - name: Build & Push storage
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=command/storage
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/erm-storage:latest

      - name: Build & Push erm-backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=ERM_backend
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/erm-backend:latest

      - name: Build & Push erm-query-organization
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=query/erm-query-organization
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/erm-query-organization:latest

      - name: Build & Push user-query
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: MODULE_PATH=query/user-query
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/erm-user-query:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.ec2.yml
          target: ${{ secrets.EC2_APP_DIR }}
          overwrite: true

      - name: Deploy to EC2 (Clean + Fresh Pull)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.EC2_APP_DIR }}"

            echo "=== Creating .env file ==="
            cat > .env << 'EOF'
            DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}
            IMAGE_TAG=latest
            AWS_RDS_ENDPOINT=${{ secrets.AWS_RDS_ENDPOINT }}
            AWS_RDS_USERNAME=${{ secrets.AWS_RDS_USERNAME }}
            AWS_RDS_PASSWORD=${{ secrets.AWS_RDS_PASSWORD }}
            AWS_REDIS_ENDPOINT=${{ secrets.AWS_REDIS_ENDPOINT }}
            EOF

            echo "=== Cleaning old containers and images ==="
            docker compose -f docker-compose.ec2.yml down -v --rmi all --remove-orphans || true

            echo "=== Pulling fresh images from Docker Hub ==="
            docker compose -f docker-compose.ec2.yml pull

            echo "=== Starting services in safe order ==="
            docker compose -f docker-compose.ec2.yml up -d discovery-server
            sleep 15

            docker compose -f docker-compose.ec2.yml up -d erm-api-gateway
            sleep 10

            docker compose -f docker-compose.ec2.yml up -d erm-command-organization org-setup-command user-setup-command storage
            sleep 25

            docker compose -f docker-compose.ec2.yml up -d erm-backend erm-query-organization user-query

            echo "✅ Deployment Completed Successfully!"
            echo "Container Status:"
            docker compose -f docker-compose.ec2.yml ps
            echo "Memory Usage:"
            free -h