name: Deploy To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test SSH connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          debug: true
          script: |
            whoami
            hostname
            mkdir -p "${{ secrets.EC2_APP_DIR }}"

      - name: Copy project source to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          source: |
            .dockerignore,
            Dockerfile,
            docker-compose.ec2.yml,
            pom.xml,
            discovery-server,
            erm-api-gateway,
            ERM_backend,
            command,
            query
          target: ${{ secrets.EC2_APP_DIR }}
          overwrite: true
          strip_components: 0

      - name: Create EC2 environment file
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          script: |
            mkdir -p "${{ secrets.EC2_APP_DIR }}"
            cat > "${{ secrets.EC2_APP_DIR }}/.env.ec2" << 'EOF'
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_RDS_ENDPOINT=${{ secrets.AWS_RDS_ENDPOINT }}
            AWS_RDS_PORT=${{ secrets.AWS_RDS_PORT != '' && secrets.AWS_RDS_PORT || '3306' }}
            AWS_RDS_USERNAME=${{ secrets.AWS_RDS_USERNAME }}
            AWS_RDS_PASSWORD=${{ secrets.AWS_RDS_PASSWORD }}
            AWS_REDIS_ENDPOINT=${{ secrets.AWS_REDIS_ENDPOINT }}
            AWS_REDIS_PORT=${{ secrets.AWS_REDIS_PORT != '' && secrets.AWS_REDIS_PORT || '6379' }}
            EOF

      - name: Deploy with Docker Compose on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.EC2_APP_DIR }}"
            set -a
            source .env.ec2
            set +a
            if command -v docker-compose >/dev/null 2>&1; then
              DC="docker-compose"
            else
              DC="docker compose"
            fi
            echo "Stopping existing containers if present..."
            $DC -f docker-compose.ec2.yml down || true
            echo "Building images with docker build..."
            docker build -t erm-discovery-server:latest --build-arg MODULE_PATH=discovery-server -f Dockerfile .
            docker build -t erm-api-gateway:latest --build-arg MODULE_PATH=erm-api-gateway -f Dockerfile .
            docker build -t erm-backend:latest --build-arg MODULE_PATH=ERM_backend -f Dockerfile .
            docker build -t erm-command-organization:latest --build-arg MODULE_PATH=command/erm-command-organization -f Dockerfile .
            docker build -t erm-query-organization:latest --build-arg MODULE_PATH=query/erm-query-organization -f Dockerfile .
            docker build -t erm-org-setup-command:latest --build-arg MODULE_PATH=command/org-setup-command -f Dockerfile .
            docker build -t erm-user-setup:latest --build-arg MODULE_PATH=command/user-command -f Dockerfile .
            docker build -t erm-storage:latest --build-arg MODULE_PATH=command/storage -f Dockerfile .
            docker build -t erm-user-query:latest --build-arg MODULE_PATH=query/user-query -f Dockerfile .
            docker build -t erm-org-setup-query:latest --build-arg MODULE_PATH=query/org-setup-query -f Dockerfile .
            echo "Starting containers from built images..."
            $DC -f docker-compose.ec2.yml up -d
            echo "Deployment complete"
            $DC -f docker-compose.ec2.yml ps

      - name: Verify deployment logs
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          script: |
            cd "${{ secrets.EC2_APP_DIR }}"
            if command -v docker-compose >/dev/null 2>&1; then
              DC="docker-compose"
            else
              DC="docker compose"
            fi
            echo "=== Container Status ==="
            $DC -f docker-compose.ec2.yml ps
            echo ""
            echo "=== Recent API Gateway Logs ==="
            $DC -f docker-compose.ec2.yml logs --tail=20 erm-api-gateway || true
            echo ""
            echo "=== Recent Discovery Server Logs ==="
            $DC -f docker-compose.ec2.yml logs --tail=20 discovery-server || true
