name: erm

# ================= COMMON CONFIG =================
x-common-env: &common-env
  SPRING_PROFILES_ACTIVE: qa
  EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://erm-discovery-server:8761/eureka/
  SPRING_DATASOURCE_URL: jdbc:mysql://${AWS_RDS_ENDPOINT}:3306/erm?createDatabaseIfNotExist=true&useSSL=true
  SPRING_DATASOURCE_USERNAME: ${AWS_RDS_USERNAME}
  SPRING_DATASOURCE_PASSWORD: ${AWS_RDS_PASSWORD}
  SPRING_DATA_REDIS_HOST: ${AWS_REDIS_ENDPOINT}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_REGION: ${AWS_REGION}

x-java-opts: &java-opts
  JAVA_TOOL_OPTIONS: >
    -XX:+UseContainerSupport
    -XX:+UseG1GC
    -XX:MaxRAMPercentage=70
    -XX:InitialRAMPercentage=30

x-common-resources: &common-resources
  mem_limit: 256m
  cpus: 0.25
  restart: "no"

# ================= SERVICES =================
services:

  # ================= EUREKA =================
  discovery-server:
    image: ${DOCKER_HUB_USERNAME}/erm-discovery-server:${IMAGE_TAG:-latest}
    container_name: erm-discovery-server
    environment:
      SPRING_PROFILES_ACTIVE: qa
      <<: *java-opts
    ports:
      - "8761:8761"
    mem_limit: 256m
    cpus: 0.25
    restart: "no"

  # ================= API GATEWAY =================
  erm-api-gateway:
    image: ${DOCKER_HUB_USERNAME}/erm-api-gateway:${IMAGE_TAG:-latest}
    container_name: erm-api-gateway
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      <<: [*common-env, *java-opts]
    ports:
      - "8080:8080"
    mem_limit: 512m
    cpus: 0.50
    restart: "no"

  # ================= CORE BACKEND =================
  erm-backend:
    image: ${DOCKER_HUB_USERNAME}/erm-backend:${IMAGE_TAG:-latest}
    container_name: erm-backend
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      <<: [*common-env, *java-opts]
    ports:
      - "8086:8086"
    mem_limit: 512m
    cpus: 0.50
    restart: "no"

  # ================= ORG COMMAND =================
  erm-command-organization:
    image: ${DOCKER_HUB_USERNAME}/erm-command-organization:${IMAGE_TAG:-latest}
    container_name: erm-command-organization
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      <<: [*common-env, *java-opts]
    ports:
      - "8081:8081"
    restart: "no"

  # ================= ORG QUERY =================
  erm-query-organization:
    image: ${DOCKER_HUB_USERNAME}/erm-query-organization:${IMAGE_TAG:-latest}
    container_name: erm-query-organization
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      <<: [*common-env, *java-opts]
    ports:
      - "8082:8082"
    <<: *common-resources

  # ================= STORAGE =================
  storage:
    image: ${DOCKER_HUB_USERNAME}/erm-storage:${IMAGE_TAG:-latest}
    container_name: erm-storage
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      <<: [*common-env, *java-opts]
    ports:
      - "8085:8085"
    mem_limit: 512m
    cpus: 0.50
    restart: "no"

  # ================= USER QUERY =================
  user-query:
    image: ${DOCKER_HUB_USERNAME}/erm-user-query:${IMAGE_TAG:-latest}
    container_name: erm-user-query
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      <<: [*common-env, *java-opts]
    ports:
      - "8087:8087"
    <<: *common-resources

  # ================= RUN-ONCE SETUP =================
  org-setup-command:
    image: ${DOCKER_HUB_USERNAME}/erm-org-setup-command:${IMAGE_TAG:-latest}
    container_name: erm-org-setup-command
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      <<: [*common-env, *java-opts]
    ports:
      - "8083:8083"
    restart: "no"

  user-setup-command:
    image: ${DOCKER_HUB_USERNAME}/erm-user-setup:${IMAGE_TAG:-latest}
    container_name: erm-user-setup-command
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      <<: [*common-env, *java-opts]
    ports:
      - "8084:8084"
    restart: "no"