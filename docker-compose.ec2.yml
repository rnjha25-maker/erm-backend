      SPRING_DATASOURCE_URL: jdbc:mysql://${AWS_RDS_ENDPOINT}:3306/erm2?createDatabaseIfNotExist=true&useSSL=true
      SPRING_DATASOURCE_USERNAME: ${AWS_RDS_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${AWS_RDS_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${AWS_REDIS_ENDPOINT}
    ports:
      - "8081:8081"
    mem_limit: 320m
    cpus: 0.35

  org-setup-command:
    image: ${DOCKER_HUB_USERNAME}/erm-org-setup-command:${IMAGE_TAG:-latest}
