      SPRING_DATASOURCE_PASSWORD: ${AWS_RDS_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${AWS_REDIS_ENDPOINT}
      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://discovery-server:8761/eureka/
    ports:
      - "8081:8081"
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5

  erm-query-organization:
