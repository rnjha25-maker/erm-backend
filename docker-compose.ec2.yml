services:

  discovery-server:
    image: ${DOCKER_HUB_USERNAME}/erm-discovery-server:${IMAGE_TAG:-latest}
    container_name: erm-discovery-server

    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: >
        -Xms128m -Xmx256m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200

      SPRING_MAIN_LAZY_INITIALIZATION: true

    ports:
      - "8761:8761"

    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  erm-api-gateway:
    image: ${DOCKER_HUB_USERNAME}/erm-api-gateway:${IMAGE_TAG:-latest}
    container_name: erm-api-gateway

    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: >
        -Xms128m -Xmx256m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200

      SPRING_MAIN_LAZY_INITIALIZATION: true
      SERVER_TOMCAT_THREADS_MAX: 50

      SPRING_DATASOURCE_URL: jdbc:mysql://${AWS_RDS_ENDPOINT}:3306/erm2?createDatabaseIfNotExist=true&useSSL=true
      SPRING_DATASOURCE_USERNAME: ${AWS_RDS_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${AWS_RDS_PASSWORD}

      SPRING_DATA_REDIS_HOST: ${AWS_REDIS_ENDPOINT}
      SPRING_DATA_REDIS_PORT: ${AWS_REDIS_PORT:-6379}

      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 5
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 2

      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://discovery-server:8761/eureka/

    ports:
      - "8080:8080"

    depends_on:
      - discovery-server

    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  erm-backend:
    image: ${DOCKER_HUB_USERNAME}/erm-backend:${IMAGE_TAG:-latest}
    container_name: erm-backend

    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: >
        -Xms128m -Xmx256m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200

      SPRING_MAIN_LAZY_INITIALIZATION: true
      SERVER_TOMCAT_THREADS_MAX: 50

      SPRING_DATASOURCE_URL: jdbc:mysql://${AWS_RDS_ENDPOINT}:3306/erm2?createDatabaseIfNotExist=true&useSSL=true
      SPRING_DATASOURCE_USERNAME: ${AWS_RDS_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${AWS_RDS_PASSWORD}

      SPRING_DATA_REDIS_HOST: ${AWS_REDIS_ENDPOINT}
      SPRING_DATA_REDIS_PORT: ${AWS_REDIS_PORT:-6379}

      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 5
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 2

      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://discovery-server:8761/eureka/

    ports:
      - "8086:8086"

    depends_on:
      - discovery-server

    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # 🔁 Repeat same optimized pattern for all services

  erm-command-organization:
    image: ${DOCKER_HUB_USERNAME}/erm-command-organization:${IMAGE_TAG:-latest}
    container_name: erm-command-organization
    environment:
      SPRING_PROFILES_ACTIVE: prod
