# EC2 Deployment Configuration
# Uses AWS RDS MySQL and ElastiCache Redis
# Images pulled from Docker Hub (built and pushed by GitHub Actions)

services:
  discovery-server:
    image: ${DOCKER_HUB_USERNAME}/erm-discovery-server:${IMAGE_TAG:-latest}
    container_name: erm-discovery-server
    environment:
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8761:8761"
    restart: unless-stopped
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "/ecs/erm-discovery-server"
        awslogs-region: "${AWS_REGION:-us-east-1}"
        awslogs-stream-prefix: "ecs"

  erm-api-gateway:
    image: ${DOCKER_HUB_USERNAME}/erm-api-gateway:${IMAGE_TAG:-latest}
    container_name: erm-api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://${AWS_RDS_ENDPOINT}:3306/erm2?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${AWS_RDS_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${AWS_RDS_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${AWS_REDIS_ENDPOINT}
      SPRING_DATA_REDIS_PORT: ${AWS_REDIS_PORT:-6379}
      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://localhost:8761/eureka/
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - discovery-server
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "/ecs/erm-api-gateway"
        awslogs-region: "${AWS_REGION:-us-east-1}"
        awslogs-stream-prefix: "ecs"

  erm-backend:
    image: ${DOCKER_HUB_USERNAME}/erm-backend:${IMAGE_TAG:-latest}
