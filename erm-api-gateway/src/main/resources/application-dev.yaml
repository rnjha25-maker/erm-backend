  eureka:
    client:
      service-url:
        defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE:http://erm-discovery-server:8761/eureka/}
      register-with-eureka: true
      fetch-registry: true
    server:
      enable-self-preservation: false

logging:
  level:
    org.springframework.security: DEBUG
allowed:
 origins: http://localhost:5173, http://localhost:5174, http://localhost:5175,http://localhost:4200

    
    
    

