spring:
  security:
    user:
      name: doc-admin
      password: admin123
  application:
    name: erm-api-gateway
  main:
    web-application-type: reactive
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/erm}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 3
      idle-timeout: 30000
      pool-name: HikariPool-1
      max-lifetime: 1800000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true

  cloud:
    gateway:
      routes:
        - id: erm-command-organization
          uri: lb://ERM-COMMAND-ORGANIZATION
          predicates:
            - Path=/org/**
          filters:
            - StripPrefix=1

        - id: erm-query-organization
          uri: lb://ERM-QUERY-ORGANIZATION
          predicates:
            - Path=/query-org/**
          filters:
            - StripPrefix=1

        - id: org-setup-command
          uri: lb://ORG-SETUP-COMMAND
          predicates:
            - Path=/org-setup/**
          filters:
            - StripPrefix=1

        - id: user-setup
          uri: lb://USER-SETUP
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

# ✅ MOVE HERE (ROOT LEVEL)
eureka:
  client:
    service-url:
      defaultZone: http://erm-discovery-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  server:
    enable-self-preservation: false

logging:
  level:
    org.springframework.security: DEBUG