spring:
  security:
    user:
      name: doc-admin
      password: admin123

  application:
    name: erm-api-gateway

  main:
    web-application-type: reactive

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/erm}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 3

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  cloud:
    gateway:
      # ✅ CORS CONFIG
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://13.205.110.140:8081"
              - "http://13.205.110.140:3000"
              - "http://13.205.110.140:5173"
              - "http://fe-erm-webapp.s3-website-us-east-1.amazonaws.com"
              - "http://localhost:4200"
              - "http://frontend-webapp-erm.s3-website-us-east-1.amazonaws.com"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      # ✅ ROUTES (same block)
      routes:
        - id: erm-command-organization
          uri: lb://ERM-COMMAND-ORGANIZATION
          predicates:
            - Path=/org/**
          filters:
            - StripPrefix=1

        - id: erm-query-organization
          uri: lb://ERM-QUERY-ORGANIZATION
          predicates:
            - Path=/query-org/**
          filters:
            - StripPrefix=1

        - id: org-setup-command
          uri: lb://ORG-SETUP-COMMAND
          predicates:
            - Path=/org-setup/**
          filters:
            - StripPrefix=1

        - id: user-setup
          uri: lb://USER-SETUP
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
          
# ✅ MOVE HERE (ROOT LEVEL)
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE:http://erm-discovery-server:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

  server:
    enable-self-preservation: false

logging:
  level:
    org.springframework.security: DEBUG